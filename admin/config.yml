backend:
  name: github
  repo: CrugerCorpDev/NOTKOMO
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "noticias"
    label: "Bitácora / Noticias"
    folder: "noticias" # <--- Regresamos a la carpeta normal
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen de Portada", name: "image", widget: "image", required: false}
      - {label: "Contenido", name: "body", widget: "markdown"}
